<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜守 MirrorGuard - AI 脑梗早筛系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        .logo {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { color: #8892b0; font-size: 16px; margin-top: 10px; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel h2 {
            color: #00d4ff;
            margin-bottom: 18px;
            font-size: 20px;
        }
        
        .input-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-color: transparent;
        }
        
        .media-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #videoElement, #previewImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #previewImage.show, #videoElement.show { display: block; }
        .placeholder { text-align: center; color: #8892b0; }
        .placeholder-icon { font-size: 48px; margin-bottom: 10px; }
        
        .upload-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px dashed rgba(0,212,255,0.3);
            border-radius: 12px;
        }
        .upload-area:hover { border-color: #00d4ff; background: rgba(0,212,255,0.05); }
        #fileInput { display: none; }
        
        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: #ff4757;
            cursor: pointer;
        }
        
        .analyze-btn {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
        }
        .analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0,212,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 18px; color: #00d4ff; }
        .loading-subtext { margin-top: 10px; font-size: 14px; color: #8892b0; }
        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            width: 0%;
            transition: width 0.3s;
        }
        
        .result-panel {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result-panel.show { display: block; }
        .result-normal { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; }
        .result-warning { background: rgba(255,193,7,0.1); border: 1px solid #ffc107; }
        .result-danger { background: rgba(255,71,87,0.1); border: 1px solid #ff4757; }
        .result-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .result-content { line-height: 1.8; color: #e0e0e0; }
        
        .tech-note {
            margin-top: 20px;
            padding: 15px;
            background: rgba(123,44,191,0.1);
            border-radius: 10px;
            border-left: 4px solid #7b2cbf;
            font-size: 14px;
            color: #8892b0;
        }
        .tech-note strong { color: #7b2cbf; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">镜守 MirrorGuard</div>
            <div class="tagline">基于蚂蚁医疗大模型 AntAngelMed 的 AI 脑梗风险评估系统</div>
        </header>
        
        <!-- 患者信息 -->
        <div class="panel" style="margin-bottom: 20px;">
            <h2>👤 患者信息（用于公平性校准）</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                <div>
                    <label style="display: block; color: #8892b0; font-size: 14px; margin-bottom: 5px;">年龄</label>
                    <input type="number" id="patientAge" placeholder="例如：65" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff;">
                </div>
                <div>
                    <label style="display: block; color: #8892b0; font-size: 14px; margin-bottom: 5px;">性别</label>
                    <select id="patientGender" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff;">
                        <option value="">请选择</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; color: #8892b0; font-size: 14px; margin-bottom: 5px;">病史</label>
                    <select id="patientHistory" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff;">
                        <option value="false">无脑血管病史</option>
                        <option value="true">有脑血管病史</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 10px; font-size: 13px; color: #666;">
                💡 基于 FAST-CAD 研究，这些信息帮助 AI 针对不同人群进行公平性校准
            </div>
        </div>
        
        <div class="main-grid">
            <div class="panel">
                <h2>📷 图像采集</h2>
                
                <div class="input-tabs">
                    <button class="tab-btn active" onclick="switchTab('camera')">📹 摄像头</button>
                    <button class="tab-btn" onclick="switchTab('upload')">📁 上传照片</button>
                </div>
                
                <div class="media-container">
                    <video id="videoElement" autoplay playsinline></video>
                    <button class="capture-btn" id="captureBtn" onclick="capturePhoto()" style="display: none;"></button>
                    
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()" style="display: none;">
                        <div class="placeholder">
                            <div class="placeholder-icon">📤</div>
                            <div>点击上传面部照片</div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
                    
                    <img id="previewImage" alt="预览">
                    
                    <div class="placeholder" id="placeholder">
                        <div class="placeholder-icon">👤</div>
                        <div>请选择输入方式</div>
                    </div>
                </div>
                
                <button class="analyze-btn" id="analyzeBtn" onclick="startAnalysis()" disabled>
                    🔍 开始 AI 风险评估
                </button>
            </div>
            
            <div class="panel">
                <h2>📊 评估结果</h2>
                
                <div id="initialState" style="text-align: center; padding: 40px; color: #8892b0;">
                    <div style="font-size: 48px; margin-bottom: 15px;">🩺</div>
                    <div>请先拍摄或上传面部照片</div>
                </div>
                
                <div id="resultPanel" class="result-panel">
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-content" id="resultContent"></div>
                </div>
                
                <div class="tech-note">
                    <strong>⚠️ 重要声明</strong><br>
                    本系统仅作为健康提醒工具，不能替代专业医疗诊断。分析结果仅供参考，如有不适请立即就医。
                </div>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">AI 正在分析中...</div>
        <div class="loading-subtext" id="loadingSubtext">正在提取面部特征点</div>
        <div class="progress-bar">
            <div class="progress-fill" id="loadingProgress"></div>
        </div>
    </div>

    <script>
        // API 代理地址
        const API_PROXY_URL = '/api/analyze';
        
        let currentMode = 'camera';
        let capturedImage = null;
        let stream = null;
        
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const video = document.getElementById('videoElement');
            const uploadArea = document.getElementById('uploadArea');
            const captureBtn = document.getElementById('captureBtn');
            const placeholder = document.getElementById('placeholder');
            const preview = document.getElementById('previewImage');
            
            capturedImage = null;
            updateAnalyzeButton();
            
            if (mode === 'camera') {
                video.style.display = 'block';
                uploadArea.style.display = 'none';
                captureBtn.style.display = 'block';
                placeholder.style.display = 'none';
                preview.classList.remove('show');
                startCamera();
            } else {
                stopCamera();
                video.style.display = 'none';
                uploadArea.style.display = 'flex';
                captureBtn.style.display = 'none';
                placeholder.style.display = 'none';
                preview.classList.remove('show');
            }
        }
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }
                });
                document.getElementById('videoElement').srcObject = stream;
                document.getElementById('videoElement').classList.add('show');
            } catch (err) {
                alert('无法访问摄像头：' + err.message);
            }
        }
        
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }
        
        function capturePhoto() {
            const video = document.getElementById('videoElement');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            capturedImage = canvas.toDataURL('image/jpeg', 0.9);
            showPreview(capturedImage);
        }
        
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                capturedImage = e.target.result;
                showPreview(capturedImage);
            };
            reader.readAsDataURL(file);
        }
        
        function showPreview(imageSrc) {
            const preview = document.getElementById('previewImage');
            preview.src = imageSrc;
            preview.classList.add('show');
            document.getElementById('videoElement').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'none';
            updateAnalyzeButton();
        }
        
        function updateAnalyzeButton() {
            document.getElementById('analyzeBtn').disabled = !capturedImage;
        }
        
        async function startAnalysis() {
            if (!capturedImage) return;
            
            showLoading();
            
            try {
                updateLoadingProgress(30, '正在上传图像...');
                await sleep(500);
                
                updateLoadingProgress(60, 'Claude AI 分析中...');
                
                // 收集患者信息
                const patientInfo = {
                    age: parseInt(document.getElementById('patientAge').value) || null,
                    gender: document.getElementById('patientGender').value || null,
                    hasHistory: document.getElementById('patientHistory').value === 'true'
                };
                
                const response = await fetch(API_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        imageBase64: capturedImage,
                        patientInfo: patientInfo
                    })
                });
                
                if (!response.ok) {
                    throw new Error('服务器错误: ' + response.status);
                }
                
                const result = await response.json();
                
                updateLoadingProgress(90, '生成报告...');
                await sleep(300);
                
                hideLoading();
                displayResult(result);
                
            } catch (error) {
                hideLoading();
                alert('分析失败：' + error.message);
            }
        }
        
        function displayResult(result) {
            document.getElementById('initialState').style.display = 'none';
            const panel = document.getElementById('resultPanel');
            panel.classList.add('show');
            panel.className = 'result-panel show result-' + result.risk_level;
            
            const titles = {
                low: ['✅', '低风险', '#00ff88'],
                medium: ['⚠️', '中度关注', '#ffc107'],
                high: ['🚨', '高风险警报', '#ff4757']
            };
            const [icon, text, color] = titles[result.risk_level] || titles.medium;
            
            document.getElementById('resultTitle').innerHTML = `${icon} ${text}`;
            document.getElementById('resultTitle').style.color = color;
            document.getElementById('resultContent').innerHTML = `
                <p><strong>AI 发现：</strong>${result.findings}</p>
                <p style="margin-top: 10px;"><strong>置信度：</strong>${result.confidence}%</p>
                <p style="margin-top: 10px;"><strong>建议：</strong>${result.recommendation}</p>
            `;
        }
        
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
            updateLoadingProgress(0, '准备中...');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }
        
        function updateLoadingProgress(percent, text) {
            document.getElementById('loadingProgress').style.width = percent + '%';
            document.getElementById('loadingSubtext').textContent = text;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        window.onload = () => startCamera();
    </script>
</body>
</html>
