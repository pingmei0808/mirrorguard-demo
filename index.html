<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜守 MirrorGuard - AI 脑梗早筛系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        .logo {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { color: #8892b0; font-size: 16px; margin-top: 10px; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel h2 {
            color: #00d4ff;
            margin-bottom: 18px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 输入方式选择 */
        .input-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-color: transparent;
        }
        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }
        
        /* 视频/图片区域 */
        .media-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #videoElement, #previewImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #previewImage.show, #videoElement.show {
            display: block;
        }
        .placeholder {
            text-align: center;
            color: #8892b0;
        }
        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        /* 文件上传 */
        .upload-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px dashed rgba(0,212,255,0.3);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.05);
        }
        #fileInput { display: none; }
        
        /* 拍照按钮 */
        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: #ff4757;
            cursor: pointer;
            transition: all 0.3s;
        }
        .capture-btn:hover {
            transform: translateX(-50%) scale(1.1);
        }
        .capture-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        /* 分析按钮 */
        .analyze-btn {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.3);
        }
        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.show {
            display: flex;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0,212,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: #00d4ff;
        }
        .loading-subtext {
            margin-top: 10px;
            font-size: 14px;
            color: #8892b0;
        }
        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }
        
        /* 结果显示 */
        .result-panel {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result-panel.show {
            display: block;
        }
        .result-normal {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
        }
        .result-warning {
            background: rgba(255,193,7,0.1);
            border: 1px solid #ffc107;
        }
        .result-danger {
            background: rgba(255,71,87,0.1);
            border: 1px solid #ff4757;
        }
        .result-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .result-content {
            line-height: 1.8;
            color: #e0e0e0;
        }
        .result-content strong {
            color: #00d4ff;
        }
        
        /* 置信度指示器 */
        .confidence-meter {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .confidence-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .confidence-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .confidence-low { background: linear-gradient(90deg, #00ff88, #00d4ff); }
        .confidence-medium { background: linear-gradient(90deg, #ffc107, #ff9500); }
        .confidence-high { background: linear-gradient(90deg, #ff4757, #ff6348); }
        
        /* 历史记录 */
        .history-list {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .history-thumb {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
        }
        .history-info {
            flex: 1;
        }
        .history-time {
            font-size: 12px;
            color: #8892b0;
        }
        .history-result {
            font-size: 14px;
            margin-top: 2px;
        }
        .history-risk-low { color: #00ff88; }
        .history-risk-medium { color: #ffc107; }
        .history-risk-high { color: #ff4757; }
        
        /* 技术说明 */
        .tech-note {
            margin-top: 20px;
            padding: 15px;
            background: rgba(123,44,191,0.1);
            border-radius: 10px;
            border-left: 4px solid #7b2cbf;
        }
        .tech-note h4 {
            color: #7b2cbf;
            margin-bottom: 10px;
        }
        .tech-note ul {
            padding-left: 18px;
            color: #8892b0;
            font-size: 14px;
            line-height: 1.8;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 12px 15px;
            background: rgba(0,212,255,0.1);
            border-radius: 8px;
            font-size: 14px;
        }
        .model-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(0,212,255,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">镜守 MirrorGuard</div>
            <div class="tagline">基于百川大模型的 AI 脑梗风险评估系统</div>
        </header>
        
        <div class="main-grid">
            <!-- 左侧：图像输入 -->
            <div class="panel">
                <h2>📷 图像采集</h2>
                
                <!-- 输入方式切换 -->
                <div class="input-tabs">
                    <button class="tab-btn active" onclick="switchTab('camera')">📹 摄像头</button>
                    <button class="tab-btn" onclick="switchTab('upload')">📁 上传照片</button>
                </div>
                
                <!-- 媒体显示区 -->
                <div class="media-container" id="mediaContainer">
                    <!-- 摄像头模式 -->
                    <video id="videoElement" autoplay playsinline></video>
                    <button class="capture-btn" id="captureBtn" onclick="capturePhoto()" style="display: none;"></button>
                    
                    <!-- 上传模式 -->
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()" style="display: none;">
                        <div class="placeholder">
                            <div class="placeholder-icon">📤</div>
                            <div>点击或拖拽上传面部照片</div>
                            <div style="font-size: 12px; margin-top: 8px; color: #666;">支持 JPG、PNG 格式</div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
                    
                    <!-- 预览图 -->
                    <img id="previewImage" alt="预览">
                    
                    <!-- 默认提示 -->
                    <div class="placeholder" id="placeholder">
                        <div class="placeholder-icon">👤</div>
                        <div>请选择摄像头或上传照片</div>
                    </div>
                </div>
                
                <div class="status-bar">
                    <span id="inputStatus">等待输入...</span>
                    <span class="model-badge">🤖 Baichuan-Omni-1.5</span>
                </div>
                
                <button class="analyze-btn" id="analyzeBtn" onclick="startAnalysis()" disabled>
                    <span>🔍</span>
                    <span>开始 AI 风险评估</span>
                </button>
            </div>
            
            <!-- 右侧：结果与历史 -->
            <div class="panel">
                <h2>📊 评估结果</h2>
                
                <!-- 初始状态 -->
                <div id="initialState" style="text-align: center; padding: 40px; color: #8892b0;">
                    <div style="font-size: 48px; margin-bottom: 15px;">🩺</div>
                    <div>请先拍摄或上传面部照片</div>
                    <div style="font-size: 14px; margin-top: 10px;">AI 将分析面部对称性、表情特征等指标</div>
                </div>
                
                <!-- 分析结果 -->
                <div id="resultPanel" class="result-panel">
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-content" id="resultContent"></div>
                    <div class="confidence-meter">
                        <div class="confidence-label">
                            <span>AI 置信度</span>
                            <span id="confidenceValue">--%</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 历史记录 -->
                <div style="margin-top: 25px;">
                    <h3 style="color: #00d4ff; font-size: 16px; margin-bottom: 12px;">📋 检测历史</h3>
                    <div class="history-list" id="historyList">
                        <div style="text-align: center; color: #8892b0; padding: 20px;">暂无记录</div>
                    </div>
                </div>
                
                <div class="tech-note">
                    <h4>⚠️ 重要声明</h4>
                    <ul>
                        <li>本系统仅作为<strong>健康提醒工具</strong>，不能替代专业医疗诊断</li>
                        <li>分析结果仅供参考，如有不适请立即就医</li>
                        <li>所有图像数据仅用于实时分析，不会存储到服务器</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">AI 正在分析中...</div>
        <div class="loading-subtext" id="loadingSubtext">正在提取面部特征点</div>
        <div class="progress-bar">
            <div class="progress-fill" id="loadingProgress"></div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const BAICHUAN_API_KEY = 'sk-9c809c41c5c932a4320b7710a07446aa';
        const BAICHUAN_API_URL = 'https://api.baichuan-ai.com/v1/chat/completions';
        const MODEL_NAME = 'Baichuan-Omni-1.5';
        
        // ==================== 状态管理 ====================
        let currentMode = 'camera'; // 'camera' | 'upload'
        let capturedImage = null;
        let stream = null;
        let analysisHistory = [];
        
        // ==================== 界面切换 ====================
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const video = document.getElementById('videoElement');
            const uploadArea = document.getElementById('uploadArea');
            const captureBtn = document.getElementById('captureBtn');
            const placeholder = document.getElementById('placeholder');
            const preview = document.getElementById('previewImage');
            
            // 重置状态
            capturedImage = null;
            updateAnalyzeButton();
            
            if (mode === 'camera') {
                video.style.display = 'block';
                uploadArea.style.display = 'none';
                captureBtn.style.display = 'block';
                placeholder.style.display = 'none';
                preview.classList.remove('show');
                startCamera();
            } else {
                stopCamera();
                video.style.display = 'none';
                uploadArea.style.display = 'flex';
                captureBtn.style.display = 'none';
                placeholder.style.display = 'none';
                preview.classList.remove('show');
            }
        }
        
        // ==================== 摄像头功能 ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                const video = document.getElementById('videoElement');
                video.srcObject = stream;
                video.classList.add('show');
                document.getElementById('inputStatus').textContent = '📹 摄像头已启动';
            } catch (err) {
                alert('无法访问摄像头：' + err.message);
                document.getElementById('inputStatus').textContent = '❌ 摄像头访问失败';
            }
        }
        
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }
        
        function capturePhoto() {
            const video = document.getElementById('videoElement');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            capturedImage = canvas.toDataURL('image/jpeg', 0.9);
            showPreview(capturedImage);
            document.getElementById('inputStatus').textContent = '✅ 照片已捕获';
        }
        
        // ==================== 文件上传 ====================
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                capturedImage = e.target.result;
                showPreview(capturedImage);
                document.getElementById('inputStatus').textContent = '✅ 图片已上传';
            };
            reader.readAsDataURL(file);
        }
        
        function showPreview(imageSrc) {
            const preview = document.getElementById('previewImage');
            const video = document.getElementById('videoElement');
            const captureBtn = document.getElementById('captureBtn');
            const uploadArea = document.getElementById('uploadArea');
            
            preview.src = imageSrc;
            preview.classList.add('show');
            
            if (currentMode === 'camera') {
                video.style.display = 'none';
                captureBtn.style.display = 'none';
            } else {
                uploadArea.style.display = 'none';
            }
            
            updateAnalyzeButton();
        }
        
        function updateAnalyzeButton() {
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = !capturedImage;
        }
        
        // ==================== AI 分析 ====================
        async function startAnalysis() {
            if (!capturedImage) return;
            
            showLoading();
            
            try {
                // 模拟进度更新（因为实际API调用可能较慢）
                updateLoadingProgress(10, '正在预处理图像...');
                await sleep(500);
                
                updateLoadingProgress(30, '正在提取面部特征...');
                await sleep(800);
                
                updateLoadingProgress(60, 'AI 模型分析中...');
                
                // 调用百川 API
                const result = await callBaichuanAPI(capturedImage);
                
                updateLoadingProgress(90, '生成评估报告...');
                await sleep(300);
                
                hideLoading();
                displayResult(result);
                addToHistory(result);
                
            } catch (error) {
                hideLoading();
                alert('分析失败：' + error.message);
                console.error(error);
            }
        }
        
        async function callBaichuanAPI(imageBase64) {
            // 移除 base64 前缀
            const base64Data = imageBase64.replace(/^data:image\/\w+;base64,/, '');
            
            const requestBody = {
                model: MODEL_NAME,
                messages: [
                    {
                        role: 'user',
                        content: [
                            {
                                type: 'text',
                                text: '请分析这张面部照片，评估是否存在脑梗（脑卒中）风险。重点关注：1）面部左右是否对称；2）嘴角是否有下垂；3）眼睑是否对称；4）表情是否自然。请以JSON格式返回：{"risk_level": "low|medium|high", "confidence": 0-100, "findings": "具体发现", "recommendation": "建议措施"}'
                            },
                            {
                                type: 'image_url',
                                image_url: {
                                    url: `data:image/jpeg;base64,${base64Data}`
                                }
                            }
                        ]
                    }
                ],
                temperature: 0.3,
                max_tokens: 500
            };
            
            const response = await fetch(BAICHUAN_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${BAICHUAN_API_KEY}`
                },
                body: JSON.stringify(requestBody)
            });
            
            if (!response.ok) {
                throw new Error(`API 错误: ${response.status}`);
            }
            
            const data = await response.json();
            return parseAIResponse(data);
        }
        
        function parseAIResponse(apiResponse) {
            // 解析 AI 返回的内容
            try {
                const content = apiResponse.choices[0].message.content;
                // 尝试提取 JSON
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    return JSON.parse(jsonMatch[0]);
                }
                
                // 如果无法解析 JSON，根据关键词判断
                const lowerContent = content.toLowerCase();
                if (lowerContent.includes('高风险') || lowerContent.includes('明显不对称')) {
                    return {
                        risk_level: 'high',
                        confidence: 85,
                        findings: content.substring(0, 200),
                        recommendation: '建议立即就医进行专业检查'
                    };
                } else if (lowerContent.includes('中度') || lowerContent.includes('轻微')) {
                    return {
                        risk_level: 'medium',
                        confidence: 65,
                        findings: content.substring(0, 200),
                        recommendation: '建议密切观察，必要时咨询医生'
                    };
                } else {
                    return {
                        risk_level: 'low',
                        confidence: 90,
                        findings: content.substring(0, 200),
                        recommendation: '目前未见明显异常，继续保持监测'
                    };
                }
            } catch (e) {
                // 兜底处理
                return {
                    risk_level: 'medium',
                    confidence: 50,
                    findings: 'AI 分析完成，但结果解析出现异常',
                    recommendation: '建议人工复核或重新拍摄'
                };
            }
        }
        
        // ==================== 结果显示 ====================
        function displayResult(result) {
            const panel = document.getElementById('resultPanel');
            const initial = document.getElementById('initialState');
            const title = document.getElementById('resultTitle');
            const content = document.getElementById('resultContent');
            
            initial.style.display = 'none';
            panel.classList.add('show');
            
            // 根据风险等级设置样式
            panel.className = 'result-panel show result-' + result.risk_level;
            
            const riskConfig = {
                low: { icon: '✅', text: '低风险', color: '#00ff88' },
                medium: { icon: '⚠️', text: '中度关注', color: '#ffc107' },
                high: { icon: '🚨', text: '高风险警报', color: '#ff4757' }
            };
            
            const config = riskConfig[result.risk_level];
            title.innerHTML = `${config.icon} ${config.text}`;
            title.style.color = config.color;
            
            content.innerHTML = `
                <p><strong>AI 发现：</strong>${result.findings}</p>
                <p style="margin-top: 10px;"><strong>建议措施：</strong>${result.recommendation}</p>
            `;
            
            // 置信度
            document.getElementById('confidenceValue').textContent = result.confidence + '%';
            const fill = document.getElementById('confidenceFill');
            fill.style.width = result.confidence + '%';
            fill.className = 'confidence-fill confidence-' + 
                (result.confidence < 50 ? 'low' : result.confidence < 80 ? 'medium' : 'high');
        }
        
        // ==================== 历史记录 ====================
        function addToHistory(result) {
            const history = {
                time: new Date().toLocaleString('zh-CN'),
                image: capturedImage,
                risk: result.risk_level,
                confidence: result.confidence
            };
            analysisHistory.unshift(history);
            renderHistory();
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (analysisHistory.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #8892b0; padding: 20px;">暂无记录</div>';
                return;
            }
            
            list.innerHTML = analysisHistory.map((item, index) => `
                <div class="history-item" onclick="loadHistory(${index})">
                    <img src="${item.image}" class="history-thumb" alt="历史记录">
                    <div class="history-info">
                        <div class="history-time">${item.time}</div>
                        <div class="history-result history-risk-${item.risk}">
                            ${item.risk === 'low' ? '✅ 低风险' : item.risk === 'medium' ? '⚠️ 中度关注' : '🚨 高风险'}
                            (${item.confidence}%)
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function loadHistory(index) {
            const item = analysisHistory[index];
            capturedImage = item.image;
            showPreview(item.image);
        }
        
        // ==================== 加载动画 ====================
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
            updateLoadingProgress(0, '准备分析...');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }
        
        function updateLoadingProgress(percent, text) {
            document.getElementById('loadingProgress').style.width = percent + '%';
            document.getElementById('loadingSubtext').textContent = text;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // ==================== 初始化 ====================
        window.onload = () => {
            // 默认启动摄像头模式
            startCamera();
        };
        
        window.onbeforeunload = () => {
            stopCamera();
        };
    </script>
</body>
</html>
